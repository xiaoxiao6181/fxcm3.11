<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport">
<meta content="yes" name="apple-mobile-web-app-capable">
<meta content="black" name="apple-mobile-web-app-status-bar-style">
<meta content="telephone=no" name="format-detection">
<meta content="email=no" name="format-detection">

<title data-i18n="reg.title">注册账号</title>

<script type="text/javascript">
window.onload = function() {
var change_rem = ((window.screen.width > 450) ? 450 : window.screen.width) / 375 * 100;
document.getElementsByTagName("html")[0].style.fontSize = change_rem + "px";
window.onresize = function() {
change_rem = ((window.screen.width > 450) ? 450 : window.screen.width) / 375 * 100;
document.getElementsByTagName("html")[0].style.fontSize = change_rem + "px";
}
}
</script>

<link rel="stylesheet" href="./static/css/ionic.css">
<link rel="stylesheet" href="./static/css/style.css">

<style>
.tipMask { width: 100%; height: 100%; background: rgba(95,95,95,0.3); position: fixed; top:0; left:0; z-index:3;}
.hide{display:none;}
.tipMask .cont{width:80%;padding:5% 10%;border-radius:5px;background:#fff;position:absolute;top:30%;left:10%;text-align:center;}
.tipMask .cont .confirm{width:100%;height:.38rem;background:#0084FF;border-radius:4px;color:#fff;line-height:.38rem;text-align:center;margin-top:.2rem;}
.newinput{width:100%;height:.51rem;border-bottom:1px solid #fff;padding-top:.2rem;}
.newinput .input-text{display:inline-block;width:.6rem;height:.3rem;font-size:.12rem;line-height:.3rem;color:#fff;}
.newinput input{border:none;width:2rem;height:.3rem;color:#fff;background:transparent;font-size:.14rem;margin-left:.1rem;}
.newbutton{height:.4rem;border-radius:.05rem;background:#c6d3ec;color:#fff;line-height:.4rem;text-align:center;font-size:.15rem;border:none;}
</style>
</head>

<body>

<div class="view-container signin-view" style="background:linear-gradient(90deg,#03aaff,#3a63ff);">

<div style="height:50px;line-height:50px;font-size:20px;font-weight:bold;color:white;text-align:center;border-bottom:1px solid rgba(255,255,255,0.3);">
<span style="float:left;margin-left:10px;" onclick="history.back(-1);">&lt;</span>
<span data-i18n="reg.title">注册账号</span>
</div>

<form id="formid">

<div class="sign_up">
<div class="sign_up_content">

<ul class="sign_up_list">

<li class="newinput">
<span class="input-text">姓名:</span>
<input type="text" id="name">
</li>

<li class="newinput">
<span class="input-text">用户名:</span>
<input type="text" id="phone">
</li>

<li class="newinput">
<span class="input-text">密码:</span>
<input type="password" id="pwd">
</li>

<li class="newinput">
<span class="input-text">确认:</span>
<input type="password" id="pwd2">
</li>

<li class="newinput">
<span class="input-text">支付:</span>
<input type="password" id="pwd3">
</li>

<li class="newinput">
<span class="input-text">确认:</span>
<input type="password" id="pwd4">
</li>

<li class="newinput">
<span class="input-text">邀请:</span>
<input id="top">
</li>

</ul>

<button class="newbutton" id="reg_btn" type="button">确认</button>

</div>
</div>
</form>

</div>

<div class="tipMask hide">
<div class="cont">
<p class="title">提示</p>
<p class="stitle contents"></p>
<div class="confirm guanbi">OK</div>
</div>
</div>

<script src="./static/js/jquery-1.9.1.min.js"></script>
<script src="./static/js/ajaxUtil.js"></script>
<script src="./static/js/i18n.js"></script>
<script src="./static/js/utils.js"></script>

<script>

const savedLang = localStorage.getItem('preferredLanguage') || I18n.defaultLang;
I18n.init(savedLang);

$(function(){

$('#reg_btn').click(function(){

var url = (typeof baseConfig !== 'undefined' ? baseConfig.baseUrl : '') + "/index/login/reg";

$.ajax({
type:"POST",
url:url,
data:{
name:$('#name').val(),
phone:$('#phone').val(),
password:$('#pwd').val(),
password2:$('#pwd2').val(),
password3:$('#pwd3').val(),
password4:$('#pwd4').val(),
top:$('#top').val()
},
success:function(res){
console.log(res)
}
})

})

})
</script>

</body>
</html>
